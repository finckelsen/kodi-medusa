version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kodiprint-postgres
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: kodiprint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kodiprint-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
